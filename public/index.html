<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bug Analyzer — Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">

      <div class="logo">
        <span class="logo-icon">🐛</span>
        <h1>Bug Analyzer</h1>
        <p>AI-powered bug report analysis</p>
      </div>

      <!-- Toggle Tabs -->
      <div class="auth-tabs">
        <button class="tab-btn active" onclick="showTab('login')">Login</button>
        <button class="tab-btn" onclick="showTab('register')">Register</button>
      </div>

      <!-- Login Form -->
      <div id="login-form" class="auth-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••" />
        </div>
        <button class="btn-primary" onclick="handleLogin()">Login</button>
        <p id="login-error" class="error-msg"></p>
      </div>

      <!-- Register Form -->
      <div id="register-form" class="auth-form hidden">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="reg-name" placeholder="John Doe" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="reg-password" placeholder="••••••••" />
        </div>
        <button class="btn-primary" onclick="handleRegister()">Create Account</button>
        <p id="register-error" class="error-msg"></p>
      </div>

    </div>
  </div>
  <script src="js/main.js"></script>
</body>
</html>
